        body {

            overflow-x: hidden;
            opacity: 0;
            pointer-events: none;
        }
        #top-image-container {
            text-align: center;
            margin: 1em 0;
        }
        #top-image {
            object-fit: cover;
            display: block;
            margin: 0 auto;
            width: auto;
            height: 9/16;
            border-radius: 10px;
        }
        @media (max-width: 767px) {
            #top-image {
                height: 22vh;
                width: calc(22vh * 2);
                border-radius: 10px;
            }
        }
        @media (min-width: 768px) and (max-width: 1023px) {
            #top-image {
                height: 22vh;
                width: calc(22vh * 2);
                border-radius: 10px;
            }
        }
        @media (min-width: 1024px) and (max-width: 1279px) {
            #top-image {
                height: 36vh;
                width: calc(36vh * 2.5);
            }
        }
        .section {
            padding: 5px 20px;
        }
        p {
            text-indent: 2em;
            margin: 5px 0;
        }
        .media-row {
            display: flex;
            overflow-x: auto;
            padding: 5px 0;
            gap: 10px;
            cursor: grab;
        }
        .media-row img, .media-row .video-container {
            width: calc(100vw / 3.3 - 15px);
            aspect-ratio: 3 / 4;
            object-fit: cover;
            object-position: center center;
            border-radius: 5px;
            cursor: pointer;
        }
        @media (min-width: 768px) and (max-width: 1023px) {
            .media-row img, .media-row .video-container {
                width: calc(100vw / 4.3 - 15px);
                height: calc((100vw / 4.3 - 15px) * 4 / 3);
            }
        }
        @media (min-width: 1024px) and (max-width: 1279px) {
            .media-row img, .media-row .video-container {
                width: calc(100vw / 6.3 - 15px);
                height: calc((100vw / 6.3 - 15px) * 4 / 3);
            }
        }
        @media (min-width: 1280px) {
            .media-row img, .media-row .video-container {
                width: calc(100vw / 10 - 15px);
                height: calc((100vw / 10 - 15px) * 4 / 3);
            }
        }
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 100;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .fullscreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }
        .fullscreen img, .fullscreen video {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 5px;
        }
        .fullscreen.active {
            display: flex;
            animation: fadeIn 0.3s forwards;
        }
        .fullscreen.inactive {
            animation: fadeOut 0.3s forwards;
            display: flex;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        @keyframes fadeOut {
            from {opacity: 1;}
            to {opacity: 0;}
        }
        #age-mask {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        #age-input {
            margin: 20px 0;
            padding: 15px 20px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            width: 220px;
            text-align: center;
            font-size: 18px;
            outline: none;
        }
    </style>

    <script>
        let currentIndex = 0;
        let mediaItems = [];
        let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints;
        
        function checkAge() {
            const input = document.getElementById('age-input').value;
            const age = parseInt(input);
            if (!isNaN(age) && age >= 10086) {
                document.getElementById('age-mask').style.display = 'none';
                document.body.style.opacity = '1';
                document.body.style.pointerEvents = 'auto';
            }
        }
        
        document.getElementById('age-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                checkAge();
            }
        });
        
        function openFullscreen(src, isVideo = false, index = 0) {
            currentIndex = index;
            const fullscreen = document.getElementById('fullscreen');
            const img = document.getElementById('fullscreen-image');
            const video = document.getElementById('fullscreen-video');
            document.body.style.overflow = 'hidden';
            if (isVideo) {
                img.style.display = 'none';
                video.style.display = 'block';
                video.src = src;
                video.play();
            } else {
                video.style.display = 'none';
                img.style.display = 'block';
                img.src = src;
            }
            fullscreen.classList.remove('inactive');
            fullscreen.classList.add('active');
        }
        
        function closeFullscreen(event) {
            const fullscreen = document.getElementById('fullscreen');
            const img = document.getElementById('fullscreen-image');
            const video = document.getElementById('fullscreen-video');
            if (event.target !== fullscreen) return;
            fullscreen.classList.remove('active');
            fullscreen.classList.add('inactive');
            document.body.style.overflow = '';
            setTimeout(() => {
                fullscreen.classList.remove('inactive');
                img.src = '';
                video.pause();
                video.src = '';
            }, 300);
        }
        
        function switchMedia(step) {
            currentIndex += step;
            if (currentIndex < 0) {
                currentIndex = mediaItems.length - 1;
            } else if (currentIndex >= mediaItems.length) {
                currentIndex = 0;
            }
            const currentItem = mediaItems[currentIndex];
            const dataSrc = currentItem.getAttribute('data-src');
            if (dataSrc.includes('page')) {
                const videoSrc = dataSrc.replace('page', 'video').replace('.jpg', '.mp4');
                openFullscreen(videoSrc, true, currentIndex);
            } else {
                openFullscreen(dataSrc, false, currentIndex);
            }
        }
        
        document.addEventListener("DOMContentLoaded", function() {
            let lazyloadImages = document.querySelectorAll(".lazyload");
            let imageObserver = new IntersectionObserver(function(entries, observer) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        let image = entry.target;
                        image.src = image.dataset.src;
                        image.classList.remove("lazyload");
                        imageObserver.unobserve(image);
                    }
                });
            });
            lazyloadImages.forEach(function(image) {
                imageObserver.observe(image);
            });
            mediaItems = Array.from(document.querySelectorAll('.media-row img, .media-row .video-container'));
            mediaItems.forEach((item, index) => {
                if (item.tagName === 'IMG') {
                    const dataSrc = item.getAttribute('data-src');
                    if (dataSrc.includes('page')) {
                        const videoSrc = dataSrc.replace('page', 'video').replace('.jpg', '.mp4');
                        item.addEventListener('click', () => openFullscreen(videoSrc, true, index));
                    } else {
                        item.addEventListener('click', () => openFullscreen(dataSrc, false, index));
                    }
                }
            });
            document.addEventListener('keydown', (e) => {
                if (document.getElementById('fullscreen').classList.contains('active')) {
                    if (e.key === 'ArrowRight') {
                        switchMedia(1);
                    } else if (e.key === 'ArrowLeft') {
                        switchMedia(-1);
                    }
                }
            });
            if (isTouchDevice) {
                let startX;
                const fullscreen = document.getElementById('fullscreen');
                const img = document.getElementById('fullscreen-image');
                fullscreen.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                });
                fullscreen.addEventListener('touchmove', (e) => {
                    if (!startX) return;
                    const touchX = e.touches[0].clientX;

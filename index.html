    <script>
        // 页面加载完成后立即执行年龄验证
        window.onload = function() {
            while (true) {
                // 弹出输入框，要求输入大于10086的年龄
                const inputAge = prompt('请输入你的年龄（需大于10086岁）：');
                
                // 处理点击“取消”的情况
                if (inputAge === null) {
                    alert('验证未通过，无法访问页面！');
                    window.location.reload(); // 刷新或可改为跳转其他地址
                    break;
                }

                // 转换为数字并验证
                const age = Number(inputAge);
                if (!isNaN(age) && age > 10086) {
                    alert('验证通过，欢迎进入！');
                    break; // 验证通过，退出循环显示页面
                } else {
                    alert('年龄错误！必须输入大于10086的数字！');
                }
            }
        };

<script>
    let currentIndex = 0;
let mediaItems = [];
let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints;


    
    
    // 打开全屏显示图片或视频
    function openFullscreen(src, isVideo = false, index = 0) {
        currentIndex = index;  // 记录当前的索引
        const fullscreen = document.getElementById('fullscreen');
        const img = document.getElementById('fullscreen-image');
        const video = document.getElementById('fullscreen-video');

        document.body.style.overflow = 'hidden';  // 禁用网页滚动

        if (isVideo) {
            img.style.display = 'none';
            video.style.display = 'block';
            video.src = src;
            video.play();
        } else {
            video.style.display = 'none';
            img.style.display = 'block';
            img.src = src;
        }

        fullscreen.classList.remove('inactive');
        fullscreen.classList.add('active');
    }

    // 关闭全屏
    function closeFullscreen(event) {
        const fullscreen = document.getElementById('fullscreen');
        const img = document.getElementById('fullscreen-image');
        const video = document.getElementById('fullscreen-video');

        // 点击视频不关闭
        if (event.target !== fullscreen) return;

        fullscreen.classList.remove('active');
        fullscreen.classList.add('inactive');

        document.body.style.overflow = '';  // 恢复网页滚动

        setTimeout(() => {
            fullscreen.classList.remove('inactive');
            img.src = '';
            video.pause();
            video.src = '';
        }, 300);
    }

    // 切换到上一张或下一张
function switchMedia(step) {
    currentIndex += step;

    if (currentIndex < 0) {
        currentIndex = mediaItems.length - 1; // 回到最后一张
    } else if (currentIndex >= mediaItems.length) {
        currentIndex = 0; // 回到第一张
    }

    const currentItem = mediaItems[currentIndex];
    const dataSrc = currentItem.getAttribute('data-src');

    if (dataSrc.includes('page')) {  // 如果路径中包含 'page'，则认为是视频封面
        const videoSrc = dataSrc.replace('page', 'video').replace('.jpg', '.mp4');  // 替换路径以找到视频
        openFullscreen(videoSrc, true, currentIndex);  // 显示视频
    } else {  // 否则认为是普通图片
        openFullscreen(dataSrc, false, currentIndex);  // 显示图片
    }
}


    // 懒加载图片
    document.addEventListener("DOMContentLoaded", function() {
        let lazyloadImages = document.querySelectorAll(".lazyload");
        let imageObserver = new IntersectionObserver(function(entries, observer) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    let image = entry.target;
                    image.src = image.dataset.src;
                    image.classList.remove("lazyload");
                    imageObserver.unobserve(image);
                }
            });
        });

        lazyloadImages.forEach(function(image) {
            imageObserver.observe(image);
        });

        // 获取所有的图片和视频元素
        mediaItems = Array.from(document.querySelectorAll('.media-row img, .media-row .video-container'));

        // 为每个图片和视频添加点击事件
 mediaItems.forEach((item, index) => {
    if (item.tagName === 'IMG') {
        const dataSrc = item.getAttribute('data-src');
        if (dataSrc.includes('page')) {  // 判断是否是视频封面
            const videoSrc = dataSrc.replace('page', 'video').replace('.jpg', '.mp4');  // 替换路径
            item.addEventListener('click', () => openFullscreen(videoSrc, true, index));  // 显示视频
        } else {
            item.addEventListener('click', () => openFullscreen(dataSrc, false, index));  // 显示图片
        }
    }
});


        // 键盘左右键监听
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('fullscreen').classList.contains('active')) {
                if (e.key === 'ArrowRight') {
                    switchMedia(1); // 下一张
                } else if (e.key === 'ArrowLeft') {
                    switchMedia(-1); // 上一张
                }
            }
        });

        // 移动端滑动切换图片/视频
